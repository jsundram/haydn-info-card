<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Haydn periodic table">
  <!-- Maskable source: FULL-BLEED square (no rounded corners) so Android's mask never reveals
       a transparent edge. Same art as icon.svg, scaled into the center ~80% safe zone via a
       group transform so the crop never clips the glyphs (mirrors Boccherini's maskable). -->
  <rect width="180" height="180" fill="#42d4f4"/>
  <g transform="translate(90,90) scale(0.8) translate(-90,-90)">
    <text x="15" y="40" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#10262b" fill-opacity="0.72">68</text>
    <text x="90" y="133" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="100" fill="#10262b" text-anchor="middle">Hn</text>
  </g>
</svg>
